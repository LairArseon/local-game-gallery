name: Release From Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release from
        required: true
        default: main
      tag:
        description: "Git tag for this release (example: v2.7.1)"
        required: true
      release_name:
        description: Release title (optional, defaults to tag)
        required: false
        default: ''
      draft:
        description: Create as draft release
        required: true
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
      prerelease:
        description: Mark as pre-release
        required: true
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installers
        run: npm run dist:all:win

      - name: Ensure EXE assets exist
        shell: pwsh
        run: |
          $assets = Get-ChildItem -Path release -Recurse -File -Filter *.exe
          if (-not $assets -or $assets.Count -eq 0) {
            throw 'No .exe files found in release/. Packaging may have failed.'
          }

          Write-Host 'Found executable assets:'
          $assets | ForEach-Object { Write-Host "- $($_.FullName)" }

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          target_commitish: ${{ github.event.inputs.branch }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || github.event.inputs.tag }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            release/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
