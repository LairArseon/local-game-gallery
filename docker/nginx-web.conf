server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Route browser client API calls through the internal compose network.
  location /service/ {
    proxy_pass http://gallery-service:37995/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Allow direct /api/* calls when clients are configured against web origin.
  location /api/ {
    proxy_pass http://gallery-service:37995/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
